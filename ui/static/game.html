                        { key: 'coreLevel', label: '⚡ 聚能核心', desc: `攻击力+1 (当前Lv${persistentData.coreLevel}/5)`,
                            cost: 18 + persistentData.coreLevel * 12 },
                    ];

                    const btnW = canvas.width * 0.7;
                    const btnH = canvas.height * 0.07;
                    const btnStartY = canvas.height * 0.36;
                    const btnGap = canvas.height * 0.025;

                    this._upgradeButtons = [];
                    upgrades.forEach((upg, i) => {
                        const by = btnStartY + i * (btnH + btnGap);
                        const bx = canvas.width / 2 - btnW / 2;
                        const canAfford = persistentData.crystals >= upg.cost;
                        const maxed = persistentData[upg.key] >= 5;
                        ctx.fillStyle = maxed ? 'rgba(40,40,40,0.8)' : canAfford ? 'rgba(30,20,60,0.9)' :
                            'rgba(40,30,30,0.8)';
                        ctx.strokeStyle = maxed ? '#555' : canAfford ? '#c9a050' : '#664444';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.roundRect(bx, by, btnW, btnH, 10);
                        ctx.fill();
                        ctx.stroke();
                        ctx.fillStyle = maxed ? '#888' : canAfford ? '#f0d878' : '#aa8888';
                        ctx.font = `bold ${Math.floor(14*s)}px "PingFang SC","Microsoft YaHei",monospace`;
                        ctx.textAlign = 'center';
                        const label = maxed ? `${upg.label} - 已满级` :
                            `${upg.label} - ${upg.cost}晶石`;
                        ctx.fillText(label, canvas.width / 2, by + btnH * 0.55);
                        ctx.fillStyle = '#b8a090';
                        ctx.font = `${Math.floor(11*s)}px "PingFang SC","Microsoft YaHei",monospace`;
                        ctx.fillText(upg.desc, canvas.width / 2, by + btnH * 0.85);
                        this._upgradeButtons.push({ x: bx, y: by, w: btnW, h: btnH, key: upg.key, cost: upg.cost,
                            maxed });
                    });

                    // Restart button
                    const restY = btnStartY + 3 * (btnH + btnGap) + btnGap;
                    ctx.fillStyle = '#3a1a6e';
                    ctx.strokeStyle = '#f0d878';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.roundRect(canvas.width / 2 - btnW / 2, restY, btnW, btnH + 10, 25);
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = '#f0d878';
                    ctx.font = `bold ${Math.floor(18*s)}px "PingFang SC","Microsoft YaHei",monospace`;
                    ctx.fillText('🔄 再次出发', canvas.width / 2, restY + (btnH + 10) * 0.6);
                    this._restartButton = { x: canvas.width / 2 - btnW / 2, y: restY, w: btnW, h: btnH + 10 };

                    ctx.fillStyle = '#887868';
                    ctx.font = `${Math.floor(11*s)}px "PingFang SC","Microsoft YaHei",monospace`;
                    ctx.fillText(`晶石余额: ${persistentData.crystals}`, canvas.width / 2, restY + btnH + 30);
                }

                handleClick(screenX, screenY) {
                    const s = this.scale;
                    if (this.state === STATE.MENU) {
                        const btnY = BASE_HEIGHT * 0.64 * s;
                        const btnW = 180 * s;
                        const btnH = 50 * s;
                        const btnX = canvas.width / 2 - btnW / 2;
                        if (screenX >= btnX && screenX <= btnX + btnW && screenY >= btnY && screenY <= btnY + btnH) {
                            this.startGame();
                            this.lastTime = performance.now();
                        }
                        return;
                    }

                    if (this.state === STATE.PAUSED) {
                        this.togglePause();
                        this.lastTime = performance.now();
                        return;
                    }

                    if (this.state === STATE.BRANCH) {
                        if (this._branchRegions) {
                            for (const reg of this._branchRegions) {
                                if (screenX >= reg.x && screenX <= reg.x + reg.w &&
                                    screenY >= reg.y && screenY <= reg.y + reg.h) {
                                    this.selectBranch(reg.id);
                                    this._branchRegions = null;
                                    this.lastTime = performance.now();
                                    return;
                                }
                            }
                        }
                        return;
                    }

                    if (this.state === STATE.DEAD) {
                        // Check upgrade buttons
                        if (this._upgradeButtons) {
                            for (const btn of this._upgradeButtons) {
                                if (screenX >= btn.x && screenX <= btn.x + btn.w &&
                                    screenY >= btn.y && screenY <= btn.y + btn.h) {
                                    if (!btn.maxed && persistentData.crystals >= btn.cost) {
                                        persistentData.crystals -= btn.cost;
                                        persistentData[btn.key] = Math.min(5, persistentData[btn.key] + 1);
                                        saveGame();
                                        this.applyUpgrades();
                                        // Redraw death screen
                                        this._upgradeButtons = null;
                                        this._restartButton = null;
                                    }
                                    return;
                                }
                            }
                        }
                        // Check restart button
                        if (this._restartButton) {
                            const rb = this._restartButton;
                            if (screenX >= rb.x && screenX <= rb.x + rb.w &&
                                screenY >= rb.y && screenY <= rb.y + rb.h) {
                                this.startGame();
                                this.lastTime = performance.now();
                                this._upgradeButtons = null;
                                this._restartButton = null;
                                return;
                            }
                        }
                        return;
                    }

                    // In game - toggle pause if tapping top-right area
                    const pauseX = canvas.width - 40 * s;
                    const pauseY = 55 * s;
                    if (screenX > canvas.width - 50 * s && screenY < 80 * s) {
                        this.togglePause();
                        if (this.state === STATE.PAUSED) this.lastTime = performance.now();
                        return;
                    }
                }

                handlePointerDown(screenX, screenY) {
                    if (this.state === STATE.PLAYING) {
                        const midX = canvas.width / 2;
                        if (screenX < midX) {
                            this.moveLeft = true;
                            this.moveRight = false;
                        } else {
                            this.moveRight = true;
                            this.moveLeft = false;
                        }
                        this.boostFire = true;
                        // Start charging if held on right side
                        if (screenX >= midX) {
                            this.chargeHeld = true;
                        }
                    }
                }

                handlePointerMove(screenX, screenY) {
                    if (this.state === STATE.PLAYING) {
                        const midX = canvas.width / 2;
                        if (screenX < midX) {
                            this.moveLeft = true;
                            this.moveRight = false;
                            this.chargeHeld = false;
                        } else {
                            this.moveRight = true;
                            this.moveLeft = false;
                            this.chargeHeld = true;
                        }
                        this.boostFire = true;
                    }
                }

                handlePointerUp() {
                    this.moveLeft = false;
                    this.moveRight = false;
                    this.boostFire = false;
                    this.chargeHeld = false;
                }
            }

            // --- Initialize Game ---
            const game = new Game();
            game.updateScale();

            // --- Input Handling ---
            canvas.addEventListener('mousedown', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const sx = e.clientX - rect.left;
                const sy = e.clientY - rect.top;
                game.handleClick(sx, sy);
                game.handlePointerDown(sx, sy);
            });

            canvas.addEventListener('mousemove', (e) => {
                if (e.buttons > 0) {
                    const rect = canvas.getBoundingClientRect();
                    const sx = e.clientX - rect.left;
                    const sy = e.clientY - rect.top;
                    game.handlePointerMove(sx, sy);
                }
            });

            canvas.addEventListener('mouseup', (e) => {
                game.handlePointerUp();
            });

            canvas.addEventListener('mouseleave', () => {
                game.handlePointerUp();
            });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const sx = touch.clientX - rect.left;
                const sy = touch.clientY - rect.top;
                game.handleClick(sx, sy);
                game.handlePointerDown(sx, sy);
                if (navigator.vibrate) {
                    try { navigator.vibrate(8); } catch (e) {}
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const sx = touch.clientX - rect.left;
                const sy = touch.clientY - rect.top;
                game.handlePointerMove(sx, sy);
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                game.handlePointerUp();
            });

            canvas.addEventListener('touchcancel', () => {
                game.handlePointerUp();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                    e.preventDefault();
                    game.moveLeft = true;
                    game.boostFire = true;
                }
                if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                    e.preventDefault();
                    game.moveRight = true;
                    game.boostFire = true;
                    game.chargeHeld = true;
                }
                if (e.key === ' ' || e.key === 'Escape') {
                    e.preventDefault();
                    if (game.state === STATE.PLAYING || game.state === STATE.PAUSED) {
                        game.togglePause();
                    }
                }
                if (e.key === 'Enter' && game.state === STATE.MENU) {
                    game.startGame();
                    game.lastTime = performance.now();
                }
                if (e.key === 'Enter' && game.state === STATE.DEAD) {
                    game.startGame();
                    game.lastTime = performance.now();
                }
            });

            document.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                    game.moveLeft = false;
                    if (!game.moveRight) game.boostFire = false;
                }
                if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                    game.moveRight = false;
                    game.chargeHeld = false;
                    if (!game.moveLeft) game.boostFire = false;
                }
            });

            // --- Game Loop ---
            function gameLoop(timestamp) {
                if (!game.lastTime) game.lastTime = timestamp;
                let dt = (timestamp - game.lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.2) dt = 0.2; // Cap to avoid jumps
                game.lastTime = timestamp;

                if (game.state === STATE.PLAYING) {
                    game.update(dt);
                    // Update projectile monsters even when not actively updating
                    if (game.monsters) {
                        for (const m of game.monsters) {
                            if (m.isProjectile && m.alive) {
                                if (m.vx !== undefined && m.vy !== undefined) {
                                    m.x += m.vx * dt;
                                    m.y += m.vy * dt;
                                } else {
                                    m.y += m.speed * dt;
                                }
                                if (m.y > BASE_HEIGHT + 60 || m.y < -100 || m.x < -50 || m.x > BASE_WIDTH + 50) {
                                    m.alive = false;
                                }
                                if (game.player.invincible <= 0 && dist(m.x, m.y, game.player.x, game.player.y) < m
                                    .size + 18) {
                                    game.hitPlayer({ x: m.x, y: m.y, type: 'projectile' });
                                    m.alive = false;
                                }
                            }
                        }
                        game.monsters = game.monsters.filter(m => m.alive || !m.isProjectile);
                    }
                }

                // Clear
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Draw
                if (game.state === STATE.MENU) {
                    game.drawMenu(ctx);
                } else if (game.state === STATE.PLAYING || game.state === STATE.PAUSED) {
                    game.draw(ctx);
                    if (game.state === STATE.PAUSED) {
                        game.drawPauseOverlay(ctx);
                    }
                } else if (game.state === STATE.BRANCH) {
                    game.draw(ctx);
                    game.drawBranchSelection(ctx);
                } else if (game.state === STATE.DEAD) {
                    game.draw(ctx);
                    game.drawDeathScreen(ctx);
                }

                requestAnimationFrame(gameLoop);
            }

            // --- Handle window blur (auto-pause) ---
            window.addEventListener('blur', () => {
                if (game.state === STATE.PLAYING) {
                    game.togglePause();
                }
            });

            // --- Start ---
            resizeCanvas();
            game.updateScale();
            game.lastTime = performance.now();
            requestAnimationFrame(gameLoop);

            console.log('🪨 深渊快线 - Abyss Express 已就绪');
            console.log('  ← 左半屏/AD键 漂移 | 右半屏/点击 加速射击 →');
            console.log('  空格键暂停 | 长按右侧蓄力攻击');
            console.log('  竖屏单手操作 · 碎片时间专属');
        })();
    </script>
</body>
</html>
