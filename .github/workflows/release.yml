name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller build.spec --noconfirm
        env:
          PLATFORM: win
          ARCH: amd64

      - name: Install NSIS
        run: choco install nsis -y

      - name: Download 7-Zip installers
        run: |
          New-Item -ItemType Directory -Force -Path 7z_installers
          Invoke-WebRequest -Uri "https://www.7-zip.org/a/7z2409-x64.exe" -OutFile "7z_installers\7z2409-x64.exe"
          Invoke-WebRequest -Uri "https://www.7-zip.org/a/7z2409.exe" -OutFile "7z_installers\7z2409.exe"
        shell: pwsh

      - name: Ensure NSIS script UTF-8 BOM encoding
        run: |
          $content = Get-Content -Path installer.nsi -Encoding UTF8 -Raw
          $utf8BomEncoding = New-Object System.Text.UTF8Encoding $true
          [System.IO.File]::WriteAllText("$PWD\installer.nsi", $content, $utf8BomEncoding)
        shell: pwsh

      - name: Build Windows Installer
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $nsisPath = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (Test-Path $nsisPath) {
            & $nsisPath "/DVERSION=$version" installer.nsi
          } else {
            $nsisPath = "C:\Program Files\NSIS\makensis.exe"
            & $nsisPath "/DVERSION=$version" installer.nsi
          }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FMCL-windows-installer
          path: FMCL-Setup-*.exe
          retention-days: 7

  build-macos-intel:
    name: Build macOS Intel DMG
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (x86_64 via Rosetta 2)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: x64

      - name: Install Python dependencies (x86_64 via Rosetta 2)
        run: |
          arch -x86_64 python -m pip install --upgrade pip setuptools wheel
          arch -x86_64 pip install pyinstaller
          arch -x86_64 pip install -r requirements.txt

      - name: Build with PyInstaller (x86_64)
        run: arch -x86_64 pyinstaller build.spec --noconfirm
        env:
          PLATFORM: mac
          ARCH: amd64

      - name: Create DMG
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          rm -rf dmg_temp FMCL-*-mac-amd64.dmg
          mkdir -p dmg_temp
          cp -R dist/FMCL.app dmg_temp/
          ln -sf /Applications dmg_temp/Applications
          hdiutil create -volname "FMCL" -srcfolder dmg_temp -ov -format UDZO "FMCL-${VERSION}-mac-amd64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FMCL-mac-amd64
          path: FMCL-*-mac-amd64.dmg
          retention-days: 7

  build-macos-arm:
    name: Build macOS Apple Silicon DMG
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller build.spec --noconfirm
        env:
          PLATFORM: mac
          ARCH: arm64

      - name: Create DMG
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          rm -rf dmg_temp FMCL-*-mac-arm64.dmg
          mkdir -p dmg_temp
          cp -R dist/FMCL.app dmg_temp/
          ln -sf /Applications dmg_temp/Applications
          hdiutil create -volname "FMCL" -srcfolder dmg_temp -ov -format UDZO "FMCL-${VERSION}-mac-arm64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FMCL-mac-arm64
          path: FMCL-*-mac-arm64.dmg
          retention-days: 7

  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull manylinux image
        run: docker pull quay.io/pypa/manylinux_2_28_x86_64

      - name: Build with PyInstaller in Docker
        run: |
          docker run --rm \
            -v "$PWD:/app" \
            -w /app \
            -e PLATFORM=linux \
            -e ARCH=amd64 \
            quay.io/pypa/manylinux_2_28_x86_64 \
            bash -exc '
              dnf install -y tk-devel dbus-devel libXScrnSaver-devel nss-devel \
                fontconfig cairo pango atk gtk3 alsa-lib \
                openssl-devel zlib-devel bzip2-devel xz-devel \
                readline-devel sqlite-devel libffi-devel 2>/dev/null

              # Build Python 3.11 with --enable-shared for PyInstaller
              PYTHON_VERSION=$(/opt/python/cp311-cp311/bin/python3.11 -c "import sys; print(sys.version.split()[0])")
              PYTHON_SRC="/opt/_internal/cpython-${PYTHON_VERSION}"
              if [ ! -f "${PYTHON_SRC}/Makefile" ]; then
                curl -sS https://www.python.org/ftp/python/${PYTHON_VERSION}/Python-${PYTHON_VERSION}.tar.xz -o /tmp/Python.tar.xz
                tar xf /tmp/Python.tar.xz -C /tmp
                PYTHON_SRC="/tmp/Python-${PYTHON_VERSION}"
              fi
              cd "${PYTHON_SRC}"
              ./configure --prefix=/opt/python/cp311-cp311 --enable-shared --with-ensurepip=install LDFLAGS="-Wl,-rpath,/opt/python/cp311-cp311/lib" 2>&1 | tail -5
              make -j$(nproc) 2>&1 | tail -3
              make install 2>&1 | tail -3
              cd /app

              export PATH="/opt/python/cp311-cp311/bin:${PATH}"
              export LD_LIBRARY_PATH="/opt/python/cp311-cp311/lib:${LD_LIBRARY_PATH}"
              pip install --upgrade pip setuptools wheel
              pip install pyinstaller
              pip install -r requirements.txt
              pyinstaller build.spec --noconfirm
            '

      - name: Build DEB package
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ARCHITECTURE="amd64"
          PKG_NAME="fmcl_${VERSION}_${ARCHITECTURE}"

          mkdir -p ${PKG_NAME}/DEBIAN
          mkdir -p ${PKG_NAME}/usr/local/bin
          mkdir -p ${PKG_NAME}/usr/share/applications

          cp dist/FMCL ${PKG_NAME}/usr/local/bin/fmcl
          chmod +x ${PKG_NAME}/usr/local/bin/fmcl

          printf '[Desktop Entry]\nName=FMCL\nComment=Fusion Minecraft Launcher\nExec=/usr/local/bin/fmcl\nIcon=fmcl\nTerminal=false\nType=Application\nCategories=Game;\n' > ${PKG_NAME}/usr/share/applications/fmcl.desktop

          printf 'Package: fmcl\nVersion: %s\nArchitecture: %s\nMaintainer: FMCL Team\nDescription: Fusion Minecraft Launcher\n A feature-rich Minecraft launcher with multi-threaded\n download support, Forge installation, and GUI version selection.\nDepends: libgtk-3-0, libnotify4, libnss3, libxss1, libxtst6, libgbm1\nSection: games\nPriority: optional\n' "$VERSION" "$ARCHITECTURE" > ${PKG_NAME}/DEBIAN/control

          sudo apt-get update && sudo apt-get install -y dpkg fakeroot
          fakeroot dpkg-deb --build ${PKG_NAME}
          mv ${PKG_NAME}.deb FMCL-${VERSION}-linux-amd64.deb

      - name: Build AppImage
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Download and extract appimagetool
          curl -sL https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -o appimagetool.AppImage
          chmod +x appimagetool.AppImage
          ./appimagetool.AppImage --appimage-extract
          APPIMAGETOOL="$(pwd)/squashfs-root/AppRun"

          # Create AppDir structure
          mkdir -p FMCL.AppDir/usr/bin
          mkdir -p FMCL.AppDir/usr/share/applications
          mkdir -p FMCL.AppDir/usr/share/icons/hicolor/256x256/apps

          cp dist/FMCL FMCL.AppDir/usr/bin/fmcl
          chmod +x FMCL.AppDir/usr/bin/fmcl

          # Generate a placeholder icon using pure Python (no PIL dependency)
          python3 -c "
          import struct, zlib
          def create_png(width, height, r, g, b):
              def chunk(ctype, data):
                  c = ctype + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              raw = b''
              for y in range(height):
                  raw += b'\x00' + bytes([r, g, b]) * width
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0)) + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b'')
          png = create_png(256, 256, 74, 105, 132)
          for p in ['FMCL.AppDir/fmcl.png', 'FMCL.AppDir/usr/share/icons/hicolor/256x256/apps/fmcl.png', 'FMCL.AppDir/.DirIcon']:
              with open(p, 'wb') as f:
                  f.write(png)
          "

          printf '#!/bin/sh\nSELF=$(readlink -f "$0")\nHERE=${SELF%%/*}\nexport PATH="${HERE}/usr/bin:${PATH}"\nexport LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"\nexec "${HERE}/usr/bin/fmcl" "$@"\n' > FMCL.AppDir/AppRun
          chmod +x FMCL.AppDir/AppRun

          printf '[Desktop Entry]\nName=FMCL\nComment=Fusion Minecraft Launcher\nExec=fmcl\nIcon=fmcl\nTerminal=false\nType=Application\nCategories=Game;\n' > FMCL.AppDir/fmcl.desktop

          # Build AppImage using extracted tool
          NO_STRIP=1 "$APPIMAGETOOL" FMCL.AppDir FMCL-${VERSION}-x86_64.AppImage

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: FMCL-linux-deb
          path: FMCL-*-linux-amd64.deb
          retention-days: 7

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: FMCL-linux-appimage
          path: FMCL-*-x86_64.AppImage
          retention-days: 7

  release:
    name: Create Release
    needs: [build-windows, build-macos-intel, build-macos-arm, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release files
        run: |
          mkdir -p release_files
          find artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \) -exec cp {} release_files/ \;
          ls -la release_files/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --reverse)
          else
            COMMITS=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --reverse)
          fi

          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          echo "## 🚀 What's Changed" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          FEATURES=$(echo "$COMMITS" | grep -i "^- feat" || true)
          if [ -n "$FEATURES" ]; then
            echo "### ✨ New Features" >> CHANGELOG.md
            echo "$FEATURES" | sed 's/^- feat(\(.*\)): /- [\1] /' | sed 's/^- feat: /- /' >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          FIXES=$(echo "$COMMITS" | grep -i "^- fix" || true)
          if [ -n "$FIXES" ]; then
            echo "### 🐛 Bug Fixes" >> CHANGELOG.md
            echo "$FIXES" | sed 's/^- fix(\(.*\)): /- [\1] /' | sed 's/^- fix: /- /' >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          IMPROVEMENTS=$(echo "$COMMITS" | grep -iE "^- (refactor|perf|docs|style)" || true)
          if [ -n "$IMPROVEMENTS" ]; then
            echo "### 💡 Improvements" >> CHANGELOG.md
            echo "$IMPROVEMENTS" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          OTHER=$(echo "$COMMITS" | grep -ivE "^- (feat|fix|refactor|perf|docs|style)" || true)
          if [ -n "$OTHER" ]; then
            echo "### 📝 Other Changes" >> CHANGELOG.md
            echo "$OTHER" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          echo "### 📦 Downloads" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "| Platform | File |" >> CHANGELOG.md
          echo "|----------|------|" >> CHANGELOG.md
          echo "| Windows | [FMCL-Setup-${VERSION}.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/FMCL-Setup-${VERSION}.exe) |" >> CHANGELOG.md
          echo "| macOS Intel | [FMCL-${VERSION}-mac-amd64.dmg](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/FMCL-${VERSION}-mac-amd64.dmg) |" >> CHANGELOG.md
          echo "| macOS Apple Silicon | [FMCL-${VERSION}-mac-arm64.dmg](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/FMCL-${VERSION}-mac-arm64.dmg) |" >> CHANGELOG.md
          echo "| Linux DEB | [FMCL-${VERSION}-linux-amd64.deb](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/FMCL-${VERSION}-linux-amd64.deb) |" >> CHANGELOG.md
          echo "| Linux AppImage | [FMCL-${VERSION}-x86_64.AppImage](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/FMCL-${VERSION}-x86_64.AppImage) |" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          if [ -n "$PREV_TAG" ]; then
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}" >> CHANGELOG.md
          fi

          cat CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          body_path: CHANGELOG.md
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
