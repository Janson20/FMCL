name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller build.spec --noconfirm
        env:
          PLATFORM: win
          ARCH: amd64

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Windows Installer
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $nsisPath = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (Test-Path $nsisPath) {
            & $nsisPath "/DVERSION=$version" installer.nsi
          } else {
            $nsisPath = "C:\Program Files\NSIS\makensis.exe"
            & $nsisPath "/DVERSION=$version" installer.nsi
          }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MCL-windows-installer
          path: MCL-Setup-*.exe
          retention-days: 7

  build-macos-intel:
    name: Build macOS Intel DMG
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (x86_64 via Rosetta 2)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: x64

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller build.spec --noconfirm
        env:
          PLATFORM: mac
          ARCH: amd64

      - name: Create DMG
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          mkdir -p dmg_temp
          cp -R dist/MCL.app dmg_temp/
          ln -sf /Applications dmg_temp/Applications
          hdiutil create -volname "MCL" -srcfolder dmg_temp -ov -format UDZO "MCL-${VERSION}-mac-amd64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MCL-mac-amd64
          path: MCL-*-mac-amd64.dmg
          retention-days: 7

  build-macos-arm:
    name: Build macOS Apple Silicon DMG
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller build.spec --noconfirm
        env:
          PLATFORM: mac
          ARCH: arm64

      - name: Create DMG
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          mkdir -p dmg_temp
          cp -R dist/MCL.app dmg_temp/
          ln -sf /Applications dmg_temp/Applications
          hdiutil create -volname "MCL" -srcfolder dmg_temp -ov -format UDZO "MCL-${VERSION}-mac-arm64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MCL-mac-arm64
          path: MCL-*-mac-arm64.dmg
          retention-days: 7

  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            tk-dev \
            uuid-dev \
            xvfb \
            libgtk-3-0 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libxtst6 \
            xdg-utils \
            libatspi2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1 \
            dpkg-dev \
            fakeroot \
            libfuse2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller build.spec --noconfirm
        env:
          PLATFORM: linux
          ARCH: amd64

      - name: Build DEB package
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ARCHITECTURE="amd64"
          PKG_NAME="mcl_${VERSION}_${ARCHITECTURE}"

          mkdir -p ${PKG_NAME}/DEBIAN
          mkdir -p ${PKG_NAME}/usr/local/bin
          mkdir -p ${PKG_NAME}/usr/share/applications

          cp dist/MCL ${PKG_NAME}/usr/local/bin/mcl
          chmod +x ${PKG_NAME}/usr/local/bin/mcl

          printf '[Desktop Entry]\nName=MCL\nComment=Minecraft Launcher\nExec=/usr/local/bin/mcl\nIcon=mcl\nTerminal=false\nType=Application\nCategories=Game;\n' > ${PKG_NAME}/usr/share/applications/mcl.desktop

          printf 'Package: mcl\nVersion: %s\nArchitecture: %s\nMaintainer: MCL Team\nDescription: Minecraft Launcher\n A feature-rich Minecraft launcher with multi-threaded\n download support, Forge installation, and GUI version selection.\nDepends: libgtk-3-0, libnotify4, libnss3, libxss1, libxtst6, libgbm1\nSection: games\nPriority: optional\n' "$VERSION" "$ARCHITECTURE" > ${PKG_NAME}/DEBIAN/control

          fakeroot dpkg-deb --build ${PKG_NAME}
          mv ${PKG_NAME}.deb MCL-${VERSION}-linux-amd64.deb

      - name: Build AppImage
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Download and extract appimagetool (avoids FUSE requirement)
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool.AppImage
          chmod +x appimagetool.AppImage
          ./appimagetool.AppImage --appimage-extract
          APPIMAGETOOL="$(pwd)/squashfs-root/AppRun"

          # Create AppDir structure
          mkdir -p MCL.AppDir/usr/bin
          mkdir -p MCL.AppDir/usr/share/applications
          mkdir -p MCL.AppDir/usr/share/icons/hicolor/256x256/apps

          cp dist/MCL MCL.AppDir/usr/bin/mcl
          chmod +x MCL.AppDir/usr/bin/mcl

          # Generate a placeholder icon using pure Python (no PIL dependency)
          python3 -c "
          import struct, zlib
          def create_png(width, height, r, g, b):
              def chunk(ctype, data):
                  c = ctype + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              raw = b''
              for y in range(height):
                  raw += b'\x00' + bytes([r, g, b]) * width
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0)) + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b'')
          png = create_png(256, 256, 74, 105, 132)
          for p in ['MCL.AppDir/mcl.png', 'MCL.AppDir/usr/share/icons/hicolor/256x256/apps/mcl.png', 'MCL.AppDir/.DirIcon']:
              with open(p, 'wb') as f:
                  f.write(png)
          "

          printf '#!/bin/sh\nSELF=$(readlink -f "$0")\nHERE=${SELF%%/*}\nexport PATH="${HERE}/usr/bin:${PATH}"\nexport LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"\nexec "${HERE}/usr/bin/mcl" "$@"\n' > MCL.AppDir/AppRun
          chmod +x MCL.AppDir/AppRun

          printf '[Desktop Entry]\nName=MCL\nComment=Minecraft Launcher\nExec=mcl\nIcon=mcl\nTerminal=false\nType=Application\nCategories=Game;\n' > MCL.AppDir/mcl.desktop

          # Build AppImage using extracted tool
          NO_STRIP=1 "$APPIMAGETOOL" MCL.AppDir MCL-${VERSION}-x86_64.AppImage

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: MCL-linux-deb
          path: MCL-*-linux-amd64.deb
          retention-days: 7

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: MCL-linux-appimage
          path: MCL-*-x86_64.AppImage
          retention-days: 7

  release:
    name: Create Release
    needs: [build-windows, build-macos-intel, build-macos-arm, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release files
        run: |
          mkdir -p release_files
          find artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \) -exec cp {} release_files/ \;
          ls -la release_files/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --reverse)
          else
            COMMITS=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --reverse)
          fi

          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          echo "## 🚀 What's Changed" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          FEATURES=$(echo "$COMMITS" | grep -i "^- feat" || true)
          if [ -n "$FEATURES" ]; then
            echo "### ✨ New Features" >> CHANGELOG.md
            echo "$FEATURES" | sed 's/^- feat(\(.*\)): /- [\1] /' | sed 's/^- feat: /- /' >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          FIXES=$(echo "$COMMITS" | grep -i "^- fix" || true)
          if [ -n "$FIXES" ]; then
            echo "### 🐛 Bug Fixes" >> CHANGELOG.md
            echo "$FIXES" | sed 's/^- fix(\(.*\)): /- [\1] /' | sed 's/^- fix: /- /' >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          IMPROVEMENTS=$(echo "$COMMITS" | grep -iE "^- (refactor|perf|docs|style)" || true)
          if [ -n "$IMPROVEMENTS" ]; then
            echo "### 💡 Improvements" >> CHANGELOG.md
            echo "$IMPROVEMENTS" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          OTHER=$(echo "$COMMITS" | grep -ivE "^- (feat|fix|refactor|perf|docs|style)" || true)
          if [ -n "$OTHER" ]; then
            echo "### 📝 Other Changes" >> CHANGELOG.md
            echo "$OTHER" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          echo "### 📦 Downloads" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "| Platform | File |" >> CHANGELOG.md
          echo "|----------|------|" >> CHANGELOG.md
          echo "| Windows | [MCL-Setup-${VERSION}.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/MCL-Setup-${VERSION}.exe) |" >> CHANGELOG.md
          echo "| macOS Intel | [MCL-${VERSION}-mac-amd64.dmg](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/MCL-${VERSION}-mac-amd64.dmg) |" >> CHANGELOG.md
          echo "| macOS Apple Silicon | [MCL-${VERSION}-mac-arm64.dmg](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/MCL-${VERSION}-mac-arm64.dmg) |" >> CHANGELOG.md
          echo "| Linux DEB | [MCL-${VERSION}-linux-amd64.deb](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/MCL-${VERSION}-linux-amd64.deb) |" >> CHANGELOG.md
          echo "| Linux AppImage | [MCL-${VERSION}-x86_64.AppImage](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/MCL-${VERSION}-x86_64.AppImage) |" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          if [ -n "$PREV_TAG" ]; then
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}" >> CHANGELOG.md
          fi

          cat CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          body_path: CHANGELOG.md
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
