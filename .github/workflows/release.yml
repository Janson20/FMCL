name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller
          pip install -r requirements-windows.txt

      - name: Generate build-time secrets
        run: |
          echo "# Auto-generated at build time" > _build_secrets.py
          echo "BUILD_CURSEFORGE_API_KEY = '''${{ secrets.CURSEFORGE_API_KEY }}'''" >> _build_secrets.py
        shell: bash

      - name: Build with PyInstaller
        run: pyinstaller build.spec --noconfirm
        env:
          PLATFORM: win
          ARCH: amd64

      - name: Install NSIS
        run: choco install nsis -y

      - name: Download 7-Zip installers
        run: |
          New-Item -ItemType Directory -Force -Path 7z_installers
          $maxRetries = 5
          $urls = @(
            @{ Uri = "https://www.7-zip.org/a/7z2409-x64.exe"; OutFile = "7z_installers\7z2409-x64.exe" },
            @{ Uri = "https://www.7-zip.org/a/7z2409.exe"; OutFile = "7z_installers\7z2409.exe" }
          )
          foreach ($item in $urls) {
            $downloaded = $false
            for ($i = 0; $i -lt $maxRetries; $i++) {
              try {
                Write-Host "Downloading $($item.Uri) (attempt $($i + 1)/$maxRetries)..."
                Invoke-WebRequest -Uri $item.Uri -OutFile $item.OutFile -TimeoutSec 60
                Write-Host "Download succeeded."
                $downloaded = $true
                break
              } catch {
                Write-Host "Download failed: $_"
                if ($i -lt $maxRetries - 1) {
                  $delay = [Math]::Pow(2, $i) * 5
                  Write-Host "Retrying in ${delay}s..."
                  Start-Sleep -Seconds $delay
                }
              }
            }
            if (-not $downloaded) {
              throw "Failed to download $($item.Uri) after $maxRetries attempts"
            }
          }
        shell: pwsh

      - name: Ensure NSIS script UTF-8 BOM encoding
        run: |
          $content = Get-Content -Path installer.nsi -Encoding UTF8 -Raw
          $utf8BomEncoding = New-Object System.Text.UTF8Encoding $true
          [System.IO.File]::WriteAllText("$PWD\installer.nsi", $content, $utf8BomEncoding)
        shell: pwsh

      - name: Build Windows Installer
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $nsisPath = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (Test-Path $nsisPath) {
            & $nsisPath "/DVERSION=$version" installer.nsi
          } else {
            $nsisPath = "C:\Program Files\NSIS\makensis.exe"
            & $nsisPath "/DVERSION=$version" installer.nsi
          }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FMCL-windows-installer
          path: FMCL-Setup-*.exe
          retention-days: 7

  release:
    name: Create Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release files
        run: |
          mkdir -p release_files
          find artifacts -type f -name "*.exe" -exec cp {} release_files/ \;
          ls -la release_files/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --reverse)
          else
            COMMITS=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --reverse)
          fi

          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          echo "## 🚀 What's Changed" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          FEATURES=$(echo "$COMMITS" | grep -i "^- feat" || true)
          if [ -n "$FEATURES" ]; then
            echo "### ✨ New Features" >> CHANGELOG.md
            echo "$FEATURES" | sed 's/^- feat(\(.*\)): /- [\1] /' | sed 's/^- feat: /- /' >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          FIXES=$(echo "$COMMITS" | grep -i "^- fix" || true)
          if [ -n "$FIXES" ]; then
            echo "### 🐛 Bug Fixes" >> CHANGELOG.md
            echo "$FIXES" | sed 's/^- fix(\(.*\)): /- [\1] /' | sed 's/^- fix: /- /' >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          IMPROVEMENTS=$(echo "$COMMITS" | grep -iE "^- (refactor|perf|docs|style)" || true)
          if [ -n "$IMPROVEMENTS" ]; then
            echo "### 💡 Improvements" >> CHANGELOG.md
            echo "$IMPROVEMENTS" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          OTHER=$(echo "$COMMITS" | grep -ivE "^- (feat|fix|refactor|perf|docs|style)" || true)
          if [ -n "$OTHER" ]; then
            echo "### 📝 Other Changes" >> CHANGELOG.md
            echo "$OTHER" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          echo "### 📦 Downloads" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "| Platform | File |" >> CHANGELOG.md
          echo "|----------|------|" >> CHANGELOG.md
          echo "| Windows | [FMCL-Setup-${VERSION}.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/FMCL-Setup-${VERSION}.exe) |" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "> macOS / Linux 二进制包自 v2.10.3 起不再随发布提供。Linux 用户请使用安装脚本 \`scripts/install.sh\` 进行安装。" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          if [ -n "$PREV_TAG" ]; then
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}" >> CHANGELOG.md
          fi

          cat CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          body_path: CHANGELOG.md
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
